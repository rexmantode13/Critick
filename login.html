<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Critick</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-layout">
    <a href="index.html" class="logo" style="position: absolute; top: 32px; left: 32px; font-size: 1.5rem;">Critick</a>
    <div class="auth-card glass-panel">
        <div class="auth-header">
            <h1>Welcome Back</h1>
            <p>Log in to rate movies and write reviews.</p>
        </div>
        <form>
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <div style="display: flex; justify-content: space-between;">
                    <label class="form-label" for="password">Password</label>
                    <a href="#" style="font-size: 0.85rem; color: var(--accent);">Forgot Password?</a>
                </div>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="form-group" style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="remember" style="accent-color: var(--accent);">
                <label for="remember" style="font-size: 0.9rem; color: var(--text-secondary); cursor: pointer;">Remember me for 30 days</label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px; padding: 14px;">Log In</button>
        </form>
        <div style="text-align: center; margin-top: 32px; font-size: 0.9rem; color: var(--text-secondary);">
            Don't have an account? <a href="register.html" style="color: var(--accent); font-weight: 600;">Sign up</a>
        </div>
    </div>
</body>
</html>
